name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write  # 👈 Trusted Publishing 必须
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish